<script type="text/html" data-template-name="google-cloud-speech-to-text-v2">
    <!--Name-->
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name">
    </div>

    <!--Credentials-->
    <div class="form-row">
        <label for="node-input-account"><i class="fa fa-user"></i> Credentials</label>
        <input type="text" id="node-input-account">
    </div>

    <!--Key File-->
    <div class="form-row">
        <label for="node-input-keyFilename"><i class="fa fa-user"></i> Key File</label>
        <input type="text" id="node-input-keyFilename">
    </div>

    <!--Project ID-->
    <div class="form-row">
        <label for="node-input-projectId"><i class="fa fa-cloud"></i> Project ID</label>
        <input type="text" id="node-input-projectId" placeholder="your-gcp-project-id">
    </div>

    <!--Recognition Model-->
    <div class="form-row">
        <label for="node-input-model"><i class="fa fa-microphone"></i> Recognition Model</label>
        <select id="node-input-model">
            <option value="chirp">chirp</option>
            <option value="chirp_2">chirp_2</option>
            <option value="latest_long">latest_long</option>
            <option value="latest_short">latest_short</option>
        </select>
    </div>

    <!--Location-->
    <div class="form-row">
        <label for="node-input-location"><i class="fa fa-globe"></i> Location</label>
        <select id="node-input-location"></select>
    </div>

    <!--Language Codes-->
    <div class="form-row">
        <label for="node-input-languageCodes" style="vertical-align:top; margin-top:4px"><i class="fa fa-language"></i> Language Codes</label>
        <div style="display:inline-block; width:70%">
            <select id="node-input-languageCodes-select" multiple style="width:100%; height:100px;"></select>
            <div id="node-input-languageCodes-hint" style="display:none; font-size:0.85em; color:#888; margin-top:3px">
                Leave empty to let chirp_2 auto-detect the language.
            </div>
        </div>
        <input type="hidden" id="node-input-languageCodes">
    </div>

    <!--Word Timecodes-->
    <div class="form-row">
        <label for="node-input-enableWordTimeOffsets"><i class="fa fa-clock-o"></i> Word Timecodes</label>
        <input type="checkbox" id="node-input-enableWordTimeOffsets" style="width:auto">
    </div>

    <!--Punctuation-->
    <div class="form-row">
        <label for="node-input-enableAutomaticPunctuation"><i class="fa fa-pencil"></i> Punctuation</label>
        <input type="checkbox" id="node-input-enableAutomaticPunctuation" style="width:auto">
    </div>

    <!--Identify Speakers-->
    <div class="form-row">
        <label for="node-input-enableSpeakerDiarization"><i class="fa fa-users"></i> Identify Speakers</label>
        <input type="checkbox" id="node-input-enableSpeakerDiarization" style="width:auto">
    </div>

    <!--Max Alternatives-->
    <div class="form-row">
        <label for="node-input-maxAlternatives"><i class="fa fa-list"></i> Max Alternatives</label>
        <input type="number" min="1" max="30" id="node-input-maxAlternatives">
    </div>

    <!--Speech Contexts-->
    <div class="form-row">
        <label for="node-input-speechContexts"><i class="fa fa-comment"></i> Speech Contexts</label>
        <input type="text" id="node-input-speechContexts" placeholder="comma-separated hint phrases">
    </div>

    <!--Audio Channel Count-->
    <div class="form-row">
        <label for="node-input-audioChannelCount"><i class="fa fa-volume-up"></i> Audio Channel Count</label>
        <input type="number" min="1" max="8" id="node-input-audioChannelCount">
    </div>

    <!--Recognize Channels Separately-->
    <div class="form-row">
        <label for="node-input-enableSeparateRecognitionPerChannel"><i class="fa fa-sliders"></i> Recognize Channels Separately</label>
        <input type="checkbox" id="node-input-enableSeparateRecognitionPerChannel" style="width:auto">
    </div>

</script>

<script type="text/html" data-help-name="google-cloud-speech-to-text-v2">
    <p>
        Convert audio speech to text using the GCP Speech-to-Text V2 API with Chirp model support.
    </p>
    <h3>Inputs</h3>
    <dl class="message-properties">
        <dt>msg.payload <span class="property-type">Buffer</span></dt>
        <dd>Raw audio bytes for short audio (&lt; 1 min), processed synchronously via <code>recognize</code>.</dd>
        <dt>msg.payload.uri <span class="property-type">string</span></dt>
        <dd>GCS URI (e.g. <code>gs://bucket/audio.flac</code>) for audio of any duration, processed asynchronously via <code>batchRecognize</code> with no duration limit.</dd>
    </dl>
    <h3>Msg overrides</h3>
    <dl class="message-properties">
        <dt>msg.speechContexts <span class="property-type">Array | string</span></dt>
        <dd>Override speech hint phrases. Accepts the full API array format or a comma-separated string of phrases.</dd>
        <dt>msg.alternativeLanguageCodes <span class="property-type">Array | string</span></dt>
        <dd>Additional language codes to merge with the language codes selected in the node config. Accepts an array or comma-separated string.</dd>
        <dt>msg.audioChannelCount <span class="property-type">number</span></dt>
        <dd>Override the number of audio channels. Values above 1 switch from auto-decoding to explicit decoding config.</dd>
        <dt>msg.enableSeparateRecognitionPerChannel <span class="property-type">boolean</span></dt>
        <dd>Override per-channel recognition setting.</dd>
    </dl>
    <h3>Outputs</h3>
    <dl class="message-properties">
        <dt>msg.payload <span class="property-type">string</span></dt>
        <dd>Plain joined transcript string when no structured options are enabled.</dd>
        <dt>msg.payload <span class="property-type">Array</span></dt>
        <dd>
            Array of result chunks when Word Timecodes, Identify Speakers, Max Alternatives &gt; 1,
            or Recognize Channels Separately is enabled. Each chunk contains:
            <ul>
                <li><code>transcript</code> — recognised text</li>
                <li><code>confidence</code> — recognition confidence (0–1)</li>
                <li><code>languageCode</code> — BCP-47 language tag detected for this segment (e.g. <code>en-US</code>, <code>hi-IN</code>)</li>
                <li><code>startTime</code>, <code>endTime</code> — seconds (Word Timecodes only)</li>
                <li><code>channelTag</code> — channel number, 1-based (Recognize Channels Separately only)</li>
                <li><code>words[]</code> — present when Word Timecodes or Identify Speakers is enabled. Each entry contains:
                    <ul>
                        <li><code>word</code> — the recognised word</li>
                        <li><code>confidence</code> — word-level confidence (0–1, when available)</li>
                        <li><code>startTime</code>, <code>endTime</code> — seconds offset from audio start (Word Timecodes only)</li>
                        <li><code>speakerLabel</code> — string identifier for the speaker (Identify Speakers only)</li>
                    </ul>
                </li>
                <li><code>alternatives[]</code> — additional hypotheses with <code>transcript</code> and <code>confidence</code> (Max Alternatives &gt; 1 only)</li>
            </ul>
        </dd>
    </dl>
    <h3>Configuration</h3>
    <p>
        <b>Recognition Model</b> determines which locations are available. <code>chirp</code> and <code>chirp_2</code>
        are available in <code>us-central1</code>, <code>europe-west4</code>, and <code>asia-southeast1</code> only.
        <code>latest_long</code> and <code>latest_short</code> are available in all regions including <code>global</code>.
    </p>
    <p>
        <b>Language Codes</b> is a multi-select list. Hold Ctrl/Cmd to select multiple languages.
        When using <code>chirp_2</code>, leaving the list empty enables automatic language detection.
        For mixed-language audio (code-switching), select all languages that may appear — <code>chirp</code> and <code>chirp_2</code> detect language switches per word automatically with no extra configuration.
        Additional languages can also be added per message via <code>msg.alternativeLanguageCodes</code>.
    </p>
    <p>
        <b>Audio decoding</b> is automatic by default (no encoding or sample rate needed).
        Setting Audio Channel Count above 1 switches to explicit decoding config.
    </p>
    <p>
        <b>Model limitations</b> — the following options are only available for <code>latest_long</code> and <code>latest_short</code>:
        <ul>
            <li><b>Identify Speakers</b> — not supported by <code>chirp</code> or <code>chirp_2</code>; the option is hidden when either is selected.</li>
            <li><b>Speech Contexts</b> (hint phrases) — not supported by <code>chirp</code> or <code>chirp_2</code>.</li>
        </ul>
    </p>
</script>

<script type="text/javascript">
var STT_V2_LANGUAGES = {
    chirp: [
        { group: "English",     codes: [["en-US","English (US)"],["en-GB","English (UK)"],["en-AU","English (Australia)"],["en-IN","English (India)"],["en-CA","English (Canada)"]] },
        { group: "Spanish",     codes: [["es-ES","Spanish (Spain)"],["es-MX","Spanish (Mexico)"],["es-US","Spanish (US)"],["es-AR","Spanish (Argentina)"],["es-CO","Spanish (Colombia)"],["es-CL","Spanish (Chile)"]] },
        { group: "French",      codes: [["fr-FR","French (France)"],["fr-CA","French (Canada)"],["fr-BE","French (Belgium)"],["fr-CH","French (Switzerland)"]] },
        { group: "German",      codes: [["de-DE","German (Germany)"],["de-AT","German (Austria)"],["de-CH","German (Switzerland)"]] },
        { group: "Portuguese",  codes: [["pt-BR","Portuguese (Brazil)"],["pt-PT","Portuguese (Portugal)"]] },
        { group: "Chinese",     codes: [["cmn-Hans-CN","Chinese Mandarin (Simplified)"],["cmn-Hant-TW","Chinese Mandarin (Traditional)"],["yue-Hant-HK","Chinese Cantonese (HK)"]] },
        { group: "Asian",       codes: [["ja-JP","Japanese"],["ko-KR","Korean"],["vi-VN","Vietnamese"],["th-TH","Thai"],["id-ID","Indonesian"],["ms-MY","Malay"],["fil-PH","Filipino"],["km-KH","Khmer"],["lo-LA","Lao"],["my-MM","Burmese"],["mn-MN","Mongolian"]] },
        { group: "South Asian", codes: [["hi-IN","Hindi"],["bn-IN","Bengali (India)"],["bn-BD","Bengali (Bangladesh)"],["gu-IN","Gujarati"],["kn-IN","Kannada"],["ml-IN","Malayalam"],["mr-IN","Marathi"],["ne-NP","Nepali"],["pa-Guru-IN","Punjabi"],["si-LK","Sinhala"],["ta-IN","Tamil (India)"],["ta-LK","Tamil (Sri Lanka)"],["te-IN","Telugu"],["ur-IN","Urdu (India)"],["ur-PK","Urdu (Pakistan)"]] },
        { group: "Arabic",      codes: [["ar-SA","Arabic (Saudi Arabia)"],["ar-EG","Arabic (Egypt)"],["ar-AE","Arabic (UAE)"],["ar-MA","Arabic (Morocco)"],["ar-IQ","Arabic (Iraq)"]] },
        { group: "European",    codes: [["it-IT","Italian"],["nl-NL","Dutch (Netherlands)"],["nl-BE","Dutch (Belgium)"],["pl-PL","Polish"],["ru-RU","Russian"],["tr-TR","Turkish"],["sv-SE","Swedish"],["da-DK","Danish"],["fi-FI","Finnish"],["nb-NO","Norwegian"],["cs-CZ","Czech"],["sk-SK","Slovak"],["hu-HU","Hungarian"],["ro-RO","Romanian"],["bg-BG","Bulgarian"],["hr-HR","Croatian"],["sr-RS","Serbian"],["uk-UA","Ukrainian"],["el-GR","Greek"],["ca-ES","Catalan"],["gl-ES","Galician"],["eu-ES","Basque"],["is-IS","Icelandic"],["lv-LV","Latvian"],["lt-LT","Lithuanian"],["et-EE","Estonian"],["sl-SI","Slovenian"],["mk-MK","Macedonian"],["bs-BA","Bosnian"],["cy-GB","Welsh"]] },
        { group: "Other",       codes: [["af-ZA","Afrikaans"],["sq-AL","Albanian"],["am-ET","Amharic"],["hy-AM","Armenian"],["az-AZ","Azerbaijani"],["be-BY","Belarusian"],["fa-IR","Persian"],["ka-GE","Georgian"],["iw-IL","Hebrew"],["kk-KZ","Kazakh"],["ps-AF","Pashto"],["sw-KE","Swahili (Kenya)"],["sw-TZ","Swahili (Tanzania)"],["uz-UZ","Uzbek"],["zu-ZA","Zulu"],["as-IN","Assamese"]] }
    ],
    standard: [
        { group: "English",     codes: [["en-US","English (US)"],["en-GB","English (UK)"],["en-AU","English (Australia)"],["en-IN","English (India)"],["en-CA","English (Canada)"]] },
        { group: "Spanish",     codes: [["es-ES","Spanish (Spain)"],["es-MX","Spanish (Mexico)"],["es-US","Spanish (US)"],["es-AR","Spanish (Argentina)"],["es-CO","Spanish (Colombia)"]] },
        { group: "French",      codes: [["fr-FR","French (France)"],["fr-CA","French (Canada)"]] },
        { group: "German",      codes: [["de-DE","German (Germany)"],["de-AT","German (Austria)"],["de-CH","German (Switzerland)"]] },
        { group: "Portuguese",  codes: [["pt-BR","Portuguese (Brazil)"],["pt-PT","Portuguese (Portugal)"]] },
        { group: "Chinese",     codes: [["cmn-Hans-CN","Chinese Mandarin (Simplified)"],["cmn-Hant-TW","Chinese Mandarin (Traditional)"],["yue-Hant-HK","Chinese Cantonese (HK)"]] },
        { group: "Asian",       codes: [["ja-JP","Japanese"],["ko-KR","Korean"],["vi-VN","Vietnamese"],["th-TH","Thai"],["id-ID","Indonesian"],["ms-MY","Malay"],["fil-PH","Filipino"]] },
        { group: "South Asian", codes: [["hi-IN","Hindi"],["bn-IN","Bengali"],["gu-IN","Gujarati"],["kn-IN","Kannada"],["ml-IN","Malayalam"],["mr-IN","Marathi"],["ta-IN","Tamil"],["te-IN","Telugu"],["ur-IN","Urdu"]] },
        { group: "Arabic",      codes: [["ar-SA","Arabic (Saudi Arabia)"],["ar-EG","Arabic (Egypt)"],["ar-AE","Arabic (UAE)"]] },
        { group: "European",    codes: [["it-IT","Italian"],["nl-NL","Dutch"],["pl-PL","Polish"],["ru-RU","Russian"],["tr-TR","Turkish"],["sv-SE","Swedish"],["da-DK","Danish"],["fi-FI","Finnish"],["cs-CZ","Czech"],["hu-HU","Hungarian"],["ro-RO","Romanian"],["el-GR","Greek"],["uk-UA","Ukrainian"],["iw-IL","Hebrew"],["nb-NO","Norwegian"],["sk-SK","Slovak"],["bg-BG","Bulgarian"],["hr-HR","Croatian"],["ca-ES","Catalan"],["eu-ES","Basque"]] },
        { group: "Other",       codes: [["af-ZA","Afrikaans"],["fa-IR","Persian"],["sw-KE","Swahili"],["zu-ZA","Zulu"]] }
    ]
};

function sttV2UpdateLanguages(selectedModel, currentCodes) {
    var langList = selectedModel.startsWith("chirp") ? STT_V2_LANGUAGES.chirp : STT_V2_LANGUAGES.standard;
    var selected = currentCodes ? currentCodes.split(",").map(function(c) { return c.trim(); }) : ["en-US"];
    var $select = $("#node-input-languageCodes-select");
    $select.empty();
    langList.forEach(function(group) {
        var $group = $("<optgroup>").attr("label", group.group);
        group.codes.forEach(function(c) {
            var $opt = $("<option>").val(c[0]).text(c[0] + " — " + c[1]);
            if (selected.indexOf(c[0]) !== -1) $opt.prop("selected", true);
            $group.append($opt);
        });
        $select.append($group);
    });
}

var STT_V2_MODEL_LOCATIONS = {
    "chirp":         ["us-central1", "europe-west4", "asia-southeast1"],
    "chirp_2":       ["us-central1", "europe-west4", "asia-southeast1"],
    "latest_long":   ["global", "us-central1", "us-east1", "us-west1", "eu", "europe-west1", "europe-west2", "europe-west4", "asia-east1", "asia-northeast1", "asia-south1", "asia-southeast1", "australia-southeast1"],
    "latest_short":  ["global", "us-central1", "us-east1", "us-west1", "eu", "europe-west1", "europe-west2", "europe-west4", "asia-east1", "asia-northeast1", "asia-south1", "asia-southeast1", "australia-southeast1"]
};

function sttV2UpdateLocations(selectedModel, currentLocation) {
    var locations = STT_V2_MODEL_LOCATIONS[selectedModel] || ["global"];
    var $select = $("#node-input-location");
    $select.empty();
    locations.forEach(function(loc) {
        $select.append($("<option>").val(loc).text(loc));
    });
    if (currentLocation && locations.indexOf(currentLocation) !== -1) {
        $select.val(currentLocation);
    } else {
        $select.val(locations[0]);
    }
}

RED.nodes.registerType("google-cloud-speech-to-text-v2", {
    category: "GCP",
    defaults: {
        account: { type: "google-cloud-credentials", required: false },
        keyFilename: { value: "", required: false },
        name: { value: "", required: false },
        projectId: { value: "", required: true },
        location: { value: "us-central1", required: false },
        model: { value: "chirp", required: false },
        languageCodes: { value: "en-US", required: false },
        enableWordTimeOffsets: { value: false, required: false },
        enableAutomaticPunctuation: { value: false, required: false },
        enableSpeakerDiarization: { value: false, required: false },
        maxAlternatives: { value: 1, required: false },
        speechContexts: { value: "", required: false },
        audioChannelCount: { value: 1, required: false },
        enableSeparateRecognitionPerChannel: { value: false, required: false }
    },
    inputs: 1,
    outputs: 1,
    icon: "speech-to-text.png",
    align: "left",
    color: "#3FADB5",
    label: function () {
        return this.name || "Speech To Text V2";
    },
    paletteLabel: "Speech To Text V2",
    oneditprepare: function () {
        var node = this;

        function updateModelDependentUI(selectedModel) {
            sttV2UpdateLocations(selectedModel, $("#node-input-location").val());
            sttV2UpdateLanguages(selectedModel, $("#node-input-languageCodes").val());
            var isChirp = selectedModel.startsWith("chirp");
            $("#node-input-enableSpeakerDiarization").closest(".form-row").toggle(!isChirp);
            if (isChirp) {
                $("#node-input-enableSpeakerDiarization").prop("checked", false);
            }
            $("#node-input-languageCodes-hint").toggle(selectedModel === "chirp_2");
        }

        updateModelDependentUI(node.model);
        $("#node-input-model").on("change", function () {
            updateModelDependentUI($(this).val());
        });
    },
    oneditsave: function () {
        var selected = $("#node-input-languageCodes-select").val() || [];
        $("#node-input-languageCodes").val(selected.join(","));
    }
});
</script>
